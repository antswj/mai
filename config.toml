# Mai's tuning surface. Models and providers live here so a swap is one edit
# plus a restart. Secrets are in .env (gitignored), never here.

[providers]
llm = "anthropic"                 # "anthropic" or "groq"
places = "merged"                 # "merged" (Google + Hot Pepper), "google", "hotpepper", or "stub"

[models]
# Anthropic defaults (verified current 2026-06). Fast classifier, quality drafter.
classifier = "claude-haiku-4-5"
drafter    = "claude-sonnet-4-6"
router     = "claude-haiku-4-5"    # fast lookup-route classifier (card brain); everything downstream waits on it
screen     = "gemini-2.5-flash"   # Gemini vision model for screen reads (smoke test now, eyes later)
# claude-opus-4-8 is available for heavy reasoning.
# If providers.llm = "groq", use instead: classifier "openai/gpt-oss-20b", drafter "openai/gpt-oss-120b".

[stt]
provider = "soniox"
model = "stt-rt-v5"                  # current Soniox real-time model (verified 2026-06)
sample_rate = 16000
language_hints = ["en", "ja", "zh"]
enable_language_identification = true
enable_speaker_diarization = true   # on the remote (system audio) side
translation = false                 # live-transcript translation (also the "Translate" switch); target = interface language
translation_engine = "soniox"       # TranslationProvider: "soniox" (same-stream, instant). A model-based engine could replace it here.

[vision]
model = "gemini-2.5-flash"          # Gemini Flash-family vision model for screen reads (verified 2026-06)

[latency]
target_seconds = 3              # local-only lookups (trivial, cached entity) aim to land within this
hard_cap_seconds = 5
online_cap_seconds = 5          # hard ceiling on any single online enrichment (network call) before it gives up

[lookup]
# The card brain: routes each surfaced trigger to trivial (local, no web/image),
# entity (Wikipedia), fresh (Gemini grounded search), or technical. Card info is
# always written in the interface language regardless of the spoken language.
enabled = true

[response]
# The suggested-reply toggle. When on, a card may include a conservative suggested
# response (in the spoken language, with furigana/pinyin and an interface-language
# translation) when one is clearly warranted. Off by default.
enabled = false

[rolling_context]
max_turns = 12
max_seconds = 120

[surfacing]
threshold = 0.6
show_suppressed_log = true
refire_cooldown_seconds = 90

[triggers]
enabled = ["place", "question", "intent", "reference", "screenReference"]

[language]
interface = "en"
floor = "ja"                      # "zh" for Chinese meetings
meeting_mode = true
furigana = true
pinyin = true

[screen]
change_threshold = 0.15           # dHash Hamming fraction; only changes above this fire a read
always_on = true                  # Mai watches continuously
settle_seconds = 1.0              # wait for the screen to settle before reading
frame_interval_seconds = 1.0     # low-rate watching (about 1 fps)
capture_source = "main_display"  # or a picker-selected window/screen

[capture]
start_paused = false             # always-on by default; user can pause anytime

[transcript]
show_live = true                 # the always-on lyrics-style live transcript view
ruby = true                      # furigana over kanji, pinyin over hanzi, as true ruby

[vad]
# On-device voice-activity gating so always-on capture only pays for transcription
# while someone is actually speaking. Silero VAD v5 runs locally (no network); each
# audio source is gated independently. Soniox bills for the full open-stream duration,
# so on sustained silence Mai ends the stream and reopens it on the next speech onset.
enabled = true
engine = "silero_v5"              # on-device Silero VAD v5 (ONNX), fully local
onset = 0.5                       # speech-probability threshold to open the gate (start a stream)
offset = 0.35                     # probability below which audio counts as silence (hysteresis vs onset)
silence_hangover_seconds = 4      # sustained silence before tearing the stream down (avoids flapping on pauses)
preroll_seconds = 1.0             # pre-onset audio kept in a ring buffer and flushed so the first word is not clipped

[echo]
# Speaker-to-mic echo suppression: when audio plays through the speakers, the mic
# picks it up and it would be transcribed twice (once as the real speaker from system
# audio, once wrongly as "You"). Mai drops the mic copy. While system audio is
# playing, a mic line is held briefly so a matching system line that finalizes
# slightly later is still caught, regardless of which stream finalizes first. Genuine
# user speech in a quiet room is never held. Headphones remove the echo at the source.
# Set MAI_DEBUG_ECHO=1 to log both streams and the decisions.
suppression = true
hold_seconds = 2.0                # how long a mic line is held while system audio is active

[location]
test_lat = 35.7016                # public Funabashi Station area, NOT a home address
test_lng = 139.9853
